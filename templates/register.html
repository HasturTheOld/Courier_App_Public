<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - CKC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-user-plus text-3xl text-green-500"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">Регистрация</h1>
                <p class="text-gray-500 text-sm">Создайте аккаунт курьера</p>
            </div>

            {% if error %}
            <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/register" class="space-y-4">
                <div>
                    <label for="first_name" class="block text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-user mr-1"></i>Имя
                    </label>
                    <input type="text" id="first_name" name="first_name" required 
                           placeholder="Введите имя"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <div>
                    <label for="last_name" class="block text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-user-tag mr-1"></i>Фамилия
                    </label>
                    <input type="text" id="last_name" name="last_name" required 
                           placeholder="Введите фамилию"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <div>
                    <label for="city" class="block text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-city mr-1"></i>Город
                    </label>
                    <input type="text" id="city" name="city" required 
                           placeholder="Введите город"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-key mr-1"></i>Пароль
                    </label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Придумайте пароль"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <button type="submit" 
                        class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-3 px-4 rounded-lg transition">
                    <i class="fas fa-user-plus mr-2"></i>Зарегистрироваться
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Уже есть аккаунт? <a href="/login" class="text-blue-500 hover:text-blue-700 font-medium">Войти</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
